[package]
name = "kreuzcrawl_nif"
version = "0.3.0-rc.63"
edition = "2024"
license = "Elastic-2.0"
description = "High-performance web crawling engine"
readme = false
keywords = ["crawl", "scrape", "spider", "web"]
categories = []

[package.metadata.cargo-machete]
ignored = ["tokio", "futures-util"]

[workspace]

[lib]
name = "kreuzcrawl_nif"

crate-type = ["cdylib"]

[dependencies]
futures-util = "0.3"
kreuzcrawl = { version = "0.3.0-rc.63", path = "../../../../crates/kreuzcrawl", features = ["interact", "browser-chromiumoxide"] }
rustler = "0.38"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "sync"] }

[patch.crates-io]
alloc-no-stdlib = { version = "=2.0.4" }
alloc-stdlib = { version = "=0.2.2" }
brotli-decompressor = { version = "=5.0.1" }
