[package]
name = "kreuzcrawl-rb"
version = "0.1.0"
edition = "2024"

[package.metadata.cargo-machete]
ignored = ["kreuzcrawl", "magnus", "serde", "serde_json", "tokio"]

[lib]
crate-type = ["cdylib"]

[dependencies]
kreuzcrawl = { path = "../../../../crates/kreuzcrawl" }
magnus = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
