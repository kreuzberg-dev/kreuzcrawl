[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "kreuzcrawl"
version = "0.1.0rc1"
description = "High-performance web crawling engine"
license = "Elastic-2.0"
requires-python = ">=3.10"
classifiers = [
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
]
authors = [
    { name = "Kreuzberg Team" }
]
keywords = ["crawl", "scrape", "web", "spider"]
[project.urls]
repository = "https://github.com/kreuzberg-dev/kreuzcrawl"

[tool.maturin]
module-name = "kreuzcrawl._kreuzcrawl"
manifest-path = "../../crates/kreuzcrawl-py/Cargo.toml"
features = ["pyo3/extension-module"]
python-packages = ["kreuzcrawl"]
