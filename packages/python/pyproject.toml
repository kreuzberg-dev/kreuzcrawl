[build-system]
build-backend = "maturin"
requires = [ "maturin>=1.7,<2" ]

[project]
name = "kreuzcrawl"
version = "0.1.0"
description = "High-performance web crawling engine"
readme = "README.md"
keywords = [ "crawl", "scrape", "spider", "web" ]
license = "Elastic-2.0"
authors = [ { name = "Kreuzberg Team", email = "team@kreuzberg.dev" } ]
requires-python = ">=3.10"
classifiers = [
  "Development Status :: 3 - Alpha",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Programming Language :: Python :: Implementation :: CPython",
  "Programming Language :: Python :: Implementation :: PyPy",
  "Programming Language :: Rust",
  "Typing :: Typed",
]

[tool.maturin]
features = [ "pyo3/extension-module" ]
module-name = "kreuzcrawl._kreuzcrawl"
manifest-path = "../../crates/kreuzcrawl-py/Cargo.toml"
python-source = "."
