default_install_hook_types:
  - pre-commit
  - commit-msg
exclude: ^docs/snippets/|vendor/|node_modules/|target/|invalid*|dist/|artifacts/|test_documents/|test_apps/|scripts/ci/|packages/.*/tools/vendor-

repos:
  # AI-Rulez: auto-generate AI assistant configuration files
  - repo: https://github.com/Goldziher/ai-rulez
    rev: v4.1.6
    hooks:
      - id: ai-rulez-validate
      - id: ai-rulez-generate

  # Commit message linting
  - repo: https://github.com/Goldziher/gitfluff
    rev: v0.8.0
    hooks:
      - id: gitfluff-lint
        args: ["--write"]
        stages: [commit-msg]

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: ^docs/reference/
      - id: check-merge-conflict
      - id: check-added-large-files
        exclude: uv.lock|docs/benchmarks/app/
      - id: detect-private-key
      - id: check-json
      - id: check-yaml
        args: ["--allow-multiple-documents", "--unsafe"]
      - id: check-toml
      - id: check-case-conflict

  # TOML formatting
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: "v2.21.2"
    hooks:
      - id: pyproject-fmt

  # Python: ruff (linting + formatting)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Shared polyrepo hooks
  - repo: https://github.com/kreuzberg-dev/pre-commit-hooks
    rev: v1.1.2
    hooks:
      - id: cargo-sort
        args: [-w]
      - id: cargo-fmt
        args: ["--all"]
      - id: cargo-check
        args: ["--workspace", "--exclude=kreuzcrawl-php", "--all-features", "--all-targets"]
      - id: cargo-clippy
        args:
          [
            "--fix",
            "--allow-dirty",
            "--allow-staged",
            "--workspace",
            "--exclude=kreuzcrawl-php",
            "--all-features",
            "--all-targets",
            "--",
            "-D",
            "warnings",
          ]
      - id: cargo-machete
        args: [crates/]
        exclude: ^(e2e/|test_apps/)
      - id: cargo-deny
        args: ["check"]
      - id: rustdoc-lint
        # Scope to the core library only. The binding wrappers (node/py/php/
        # wasm/jni/ffi/cli) are alef-generated — rustdoc gaps there are alef's
        # responsibility, fixed upstream and pulled in via the next alef-rev bump.
        files: ^crates/kreuzcrawl/src/.*\.rs$
        exclude: /tests/
        args: ["-p", "kreuzcrawl"]
      - id: pydocstyle
        files: ^packages/python/.*\.py$
        exclude: ^packages/python/(tests/|.*_native\.py$)
      - id: tsdoc-lint
        files: ^packages/typescript/src/.*\.ts$
        exclude: \.d\.ts$
      - id: alef-docs-fresh
      - id: yard-coverage
        files: ^packages/ruby/lib/.*\.rb$
        exclude: ^packages/ruby/lib/kreuzcrawl/native\.rb$
      # godoc-lint disabled — hook v1.1.2 invokes `golangci-lint --disable-all`
      # which is not accepted by golangci-lint v2.x. Re-enable after
      # pre-commit-hooks fix lands.
      # - id: godoc-lint
      #   files: ^packages/go/.*\.go$
      #   exclude: ^(e2e/|test_apps/)
      - id: javadoc-lint
        files: ^packages/java/src/main/.*\.java$
      - id: cs-xmldoc-lint
        files: ^packages/csharp/Kreuzcrawl/.*\.cs$
      # ex-doc-coverage disabled — mix docs requires compiling the elixir
      # binding, which downloads the precompiled NIF for the current crate
      # version. Pre-tag the NIF is not yet released, so download 404s.
      # Re-enable after the matching NIF artifact is published, or wire
      # `:force_build` in packages/elixir/config/dev.exs.
      # - id: ex-doc-coverage
      #   files: ^packages/elixir/lib/.*\.ex$
      - id: phpdoc-lint
        files: ^packages/php/src/.*\.php$
      - id: dart-doc-lint
        files: ^packages/dart/lib/.*\.dart$
        exclude: ^packages/dart/lib/src/rust/
      - id: swift-doc-coverage
        files: ^packages/swift/Sources/Kreuzcrawl/.*\.swift$
      - id: zig-doc-lint
        files: ^packages/zig/src/.*\.zig$
        exclude: ^packages/zig/src/kreuzcrawl\.zig$
      - id: kotlin-dokka
        files: ^packages/kotlin-android/src/main/.*\.kt$
      - id: shfmt
        args: ["-w", "-i", "2"]
      - id: shellcheck
      - id: clang-format
        args: ["--style=file"]
        files: ^crates/kreuzcrawl-ffi/tests/c/
      - id: clang-tidy
        files: ^crates/kreuzcrawl-ffi/tests/c/
      - id: checkstyle
        args: ["-c", "packages/java/checkstyle.xml", "-p", "packages/java/checkstyle.properties"]
        exclude: ^(\.mvn/wrapper/|e2e/|test_apps/|packages/java/src/)
      - id: java-verify
        files: ^packages/java/
      - id: ktfmt
        files: ^packages/kotlin-android/.*\.kts?$
        args: ["--kotlinlang-style"]
      - id: detekt
        files: ^packages/kotlin-android/.*\.kts?$
        args: ["--build-upon-default-config"]
      - id: ktlint
        files: ^packages/kotlin-android/.*\.kts?$
      - id: mypy
        exclude: "e2e/|tests/|scripts/|^packages/r/"
      - id: go-fmt
        exclude: ^(e2e/|test_apps/)
      - id: golangci-lint
        exclude: ^(e2e/|test_apps/)
        env:
          KREUZBERG_GO_MOD_DIRS: "packages/go"
      - id: govulncheck
        exclude: ^(e2e/|test_apps/)
        env:
          KREUZBERG_GO_MOD_DIRS: "packages/go"
      - id: rubocop
        files: ^packages/ruby/.*\.rb$
        exclude: ^packages/ruby/ext/
      - id: rubocop-lint
        files: ^packages/ruby/.*\.(rb|rbs)$
        exclude: ^packages/ruby/ext/
      - id: steep
        files: ^packages/ruby/.*\.(rb|rbs)$
        exclude: ^packages/ruby/ext/
      - id: dotnet-format
        files: ^packages/csharp/.*\.cs$
      - id: dotnet-format-check
        files: ^packages/csharp/.*\.cs$
      - id: php-cs-fixer
        files: ^packages/php/.*\.php$
        # packages/php/src/ and packages/php/stubs/ are alef-generated. cs-fixer's
        # PSR-12 rules reformat in ways alef's emitter doesn't produce; touching
        # them invalidates the alef:hash header and makes alef-verify fail every
        # commit. Until alef emits PSR-12-shaped PHP, skip both alef-owned dirs.
        exclude: ^packages/php/(src|stubs)/
      - id: phpstan
        # stubs/ deliberately excluded — alef-generated kreuzcrawl_extension.php has
        # constructor-promoted readonly fields phpstan flags as 'unused', which only
        # the alef codegen can fix; the .neon config still scans it as a type provider.
        files: ^packages/php/(src|tests)/.*\.php$
        args: ["analyse", "--no-progress", "--configuration", "packages/php/phpstan.neon"]
      - id: mix-format
        files: ^packages/elixir/
      - id: mix-credo
        files: ^packages/elixir/
      - id: swift-format
        files: ^packages/swift/.*\.swift$
      - id: swiftlint
        files: ^packages/swift/.*\.swift$
      - id: dart-format
        files: ^packages/dart/.*\.dart$
      - id: dart-analyze
        files: ^packages/dart/.*\.dart$
      - id: zig-fmt
        files: ^packages/zig/.*\.zig$
      - id: zig-build-check
        files: ^packages/zig/.*\.zig$
      - id: textlint
        files: ^docs/.*\.md$
        exclude: ^docs/(reference/|api-|snippets/|migration/)
        args: ["--fix", "--config", ".textlintrc.json"]
      - id: oxlint
      - id: oxfmt
      - id: cppcheck
        args: ["--suppress=unusedStructMember"]
      - id: rumdl-fmt
        # alef-generated reference docs are checked verbatim against `alef docs`
        # output in CI; rumdl's MD022 fixes would diverge from that.
        exclude: ^docs/reference/
      # markdownlint-rumdl-strict is intentionally not wired — kreuzcrawl docs
      # use zensical/material extensions (HTML grids, indented code, long URL
      # tables) that the bundled strict config over-flags. rumdl-fmt above
      # already auto-fixes the issues we care about.
      - id: cpd
        # Raise from default 100. alef-generated *Builder.java share ~213 tokens
        # of @JsonProperty boilerplate mirroring the Rust struct layout
        # (CrawlPageResult/ScrapeResult Builder chains, etc.) — structural,
        # not refactorable from the kreuzcrawl side.
        args: [--minimum-tokens=250]

  # Alef: verify bindings and sync versions.
  # Pin to v0.16.17 — the latest tag with release assets uploaded. v0.16.18/19/20
  # are tagged in git but their GitHub release artifacts have not been published.
  - repo: https://github.com/kreuzberg-dev/alef
    rev: v0.16.17
    hooks:
      - id: alef-verify
      - id: alef-sync-versions

  # GitHub Actions: linting
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Spelling: fast Rust-based spell checker
  - repo: https://github.com/crate-ci/typos
    rev: v1.46.1
    hooks:
      - id: typos
        args: [--force-exclude]
