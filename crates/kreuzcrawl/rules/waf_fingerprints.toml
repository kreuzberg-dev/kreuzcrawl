# Canonical WAF detection corpus for kreuzcrawl. Each fingerprint is
# a (vendor, weight, signals) tuple. ALL signals on a fingerprint must
# match for the fingerprint to fire. ANY fingerprint match returns a
# WafSignal for that vendor.
#
# Signal kinds:
#   response_header { name, value_contains? }
#     - name: lowercase header name
#     - value_contains: optional substring match; if absent, matches on header presence
#   body_substring { pattern }
#     - pattern: case-insensitive substring searched via Aho-Corasick
#
# Adding a fingerprint:
# 1. Capture a real response that should match
#    (anonymize: strip cookies + auth + identifying URLs).
# 2. Place it under tests/fixtures/waf/<vendor>_<scenario>_<n>.http.
# 3. Add the fingerprint block below.
# 4. Run `cargo test -p kreuzcrawl --test test_waf_fixtures` — must pass.

# ---------------------------------------------------------------------------
# Cloudflare
# ---------------------------------------------------------------------------

[[fingerprint]]
id = "cloudflare_challenge_v1"
vendor = "cloudflare"
weight = 1.0
[[fingerprint.signals]]
kind = "response_header"
name = "server"
value_contains = "cloudflare"
[[fingerprint.signals]]
kind = "body_substring"
pattern = "/cdn-cgi/challenge-platform/"

[[fingerprint]]
id = "cloudflare_cf_chl"
vendor = "cloudflare"
weight = 1.0
[[fingerprint.signals]]
kind = "body_substring"
pattern = "cf-chl-"

[[fingerprint]]
