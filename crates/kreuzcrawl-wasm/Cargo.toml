[package]
name = "kreuzcrawl-wasm"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "WebAssembly bindings (wasm-bindgen) for kreuzcrawl"
keywords = ["crawl", "scrape", "wasm", "webassembly", "bindings"]
categories = ["api-bindings", "wasm"]

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = []

[dependencies]
kreuzcrawl = { path = "../kreuzcrawl" }
kreuzcrawl-bindings-common = { path = "../kreuzcrawl-bindings-common" }
serde-wasm-bindgen = "0.6"
serde_json = { workspace = true }
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }

[lints.rust]
unsafe_code = "allow"
missing_docs = "warn"
unused_must_use = "deny"

[lints.clippy]
all = { level = "deny", priority = -1 }
cargo = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
multiple_crate_versions = { level = "allow", priority = 1 }
