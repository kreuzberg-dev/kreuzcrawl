version: "3"

vars:
  BUILD_PROFILE: '{{.BUILD_PROFILE | default "dev"}}'

tasks:
  setup:
    desc: Install development dependencies
    cmds:
      - cargo fetch
      - prek install
      - prek install --hook-type commit-msg

  build:
    desc: Build workspace
    cmds:
      - cargo build --workspace

  build:release:
    desc: Build workspace in release mode
    cmds:
      - cargo build --workspace --release

  test:
    desc: Run all tests
    cmds:
      - cargo test --workspace

  test:browser:
    desc: Run all tests with browser feature (requires Chrome/Chromium)
    cmds:
      - cargo test --workspace --features browser

  lint:
    desc: Run prek hooks
    cmds:
      - prek run --all-files

  format:
    desc: Format code
    cmds:
      - cargo fmt --all

  check:
    desc: Check without building
    cmds:
      - cargo check --workspace --all-targets

  check:browser:
    desc: Check with browser feature
    cmds:
      - cargo check --workspace --all-targets --features browser

  browser:install:
    desc: Install Chromium for browser feature testing
    cmds:
      - |
        if command -v chromium &>/dev/null || command -v chromium-browser &>/dev/null || command -v google-chrome &>/dev/null; then
          echo "Chrome/Chromium already installed"
        elif [ "$(uname)" = "Darwin" ]; then
          brew install --cask chromium
        else
          sudo apt-get update && sudo apt-get install -y chromium-browser
        fi

  clean:
    desc: Clean build artifacts
    cmds:
      - cargo clean

  e2e:generate:
    desc: Generate E2E test suites from fixtures (with format + lint)
    cmds:
      - cargo run -p kreuzcrawl-e2e-generator -- generate --fixtures fixtures --output e2e
      - task: e2e:format
      - task: e2e:lint

  e2e:format:
    desc: Format generated E2E test code
    cmds:
      - cargo fmt --manifest-path e2e/rust/Cargo.toml

  e2e:lint:
    desc: Lint generated E2E code with clippy
    cmds:
      - cargo clippy --manifest-path e2e/rust/Cargo.toml -- -D warnings

  e2e:test:
    desc: Run generated E2E tests
    deps: [e2e:generate]
    cmds:
      - cargo test --manifest-path e2e/rust/Cargo.toml

  e2e:list:
    desc: List all E2E fixtures
    cmds:
      - cargo run -p kreuzcrawl-e2e-generator -- list --fixtures fixtures

  e2e:verify:
    desc: Full E2E pipeline (generate → format → lint)
    cmds:
      - task: e2e:generate
      - git diff --exit-code e2e/

  e2e:verify:ci:
    desc: CI verification - ensure generated code is formatted, lint-clean, and up-to-date
    cmds:
      - cargo run -p kreuzcrawl-e2e-generator -- generate --fixtures fixtures --output e2e
      - cargo fmt --manifest-path e2e/rust/Cargo.toml --check
      - cargo clippy --manifest-path e2e/rust/Cargo.toml -- -D warnings
      - git diff --exit-code e2e/

  # --- Docker tasks ---

  docker:build:
    desc: Build Docker image (API server)
    cmds:
      - docker build -f docker/Dockerfile -t kreuzcrawl:dev .

  docker:build:cli:
    desc: Build Docker image (CLI only)
    cmds:
      - docker build -f docker/Dockerfile.cli -t kreuzcrawl:cli .

  docker:run:
    desc: Run API server in Docker
    deps: [docker:build]
    cmds:
      - docker run -p 3000:3000 kreuzcrawl:dev

  # --- Schemathesis API contract tests ---

  schemathesis:
    desc: Run schemathesis API contract tests (requires running server on :3000)
    cmds:
      - pip3 install schemathesis
      - >-
        schemathesis run http://localhost:3000/openapi.json
        --max-examples=10
        --request-timeout=30000
        --checks not_a_server_error,status_code_conformance,content_type_conformance,response_schema_conformance,negative_data_rejection

  # --- Feature-gated test tasks ---

  test:api:
    desc: Run API tests
    cmds:
      - cargo test --workspace --features api

  test:mcp:
    desc: Run MCP tests
    cmds:
      - cargo test --workspace --features mcp

  test:all-features:
    desc: Run all tests with all features
    cmds:
      - cargo test --workspace --features "warc,interact,mcp,api,ai"

  # --- Python tasks ---

  python:install:
    desc: Install Python dev dependencies via uv
    cmds:
      - uv sync --no-install-workspace --no-install-project

  python:lint:
    desc: Run Python linters
    cmds:
      - uv run ruff check --fix
      - uv run ruff format

  python:pyproject:format:
    desc: Format pyproject.toml
    cmds:
      - uv run pyproject-fmt pyproject.toml

  python:pyproject:validate:
    desc: Validate pyproject.toml
    cmds:
      - uv run validate-pyproject pyproject.toml
