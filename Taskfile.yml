version: "3"

includes:
  _cfg:
    taskfile: .task/config/vars.yml
    internal: true

  rust:
    taskfile: .task/languages/rust.yml
  python:
    taskfile: .task/languages/python.yml
  node:
    taskfile: .task/languages/node.yml
  wasm:
    taskfile: .task/languages/wasm.yml
  ruby:
    taskfile: .task/languages/ruby.yml
  go:
    taskfile: .task/languages/go.yml
  java:
    taskfile: .task/languages/java.yml
  csharp:
    taskfile: .task/languages/csharp.yml
  php:
    taskfile: .task/languages/php.yml
  elixir:
    taskfile: .task/languages/elixir.yml
  c:
    taskfile: .task/languages/c.yml
  brew:
    taskfile: .task/languages/brew.yml
  dart:
    taskfile: .task/languages/dart.yml
  kotlin-android:
    taskfile: .task/languages/kotlin-android.yml
  swift:
    taskfile: .task/languages/swift.yml
  zig:
    taskfile: .task/languages/zig.yml

  _build_wf:
    taskfile: .task/workflows/build.yml
    internal: true
  _test_wf:
    taskfile: .task/workflows/test.yml
    internal: true
  _lint_wf:
    taskfile: .task/workflows/lint.yml
    internal: true
  _e2e_wf:
    taskfile: .task/workflows/e2e.yml
    internal: true
  _dev_wf:
    taskfile: .task/workflows/dev-cycle.yml
    internal: true

  version:
    taskfile: .task/tools/version-sync.yml
  docker:
    taskfile: .task/tools/docker.yml
  docs:
    taskfile: .task/tools/docs.yml
  test-apps:
    taskfile: .task/tools/test-apps.yml
  benchmark:
    taskfile: .task/workflows/benchmark.yml
  _tools:
    taskfile: .task/tools/general.yml
    flatten: true

vars:
  RUST_LOG: info

# Preconditions for task setup:
# - Rust toolchain (rustup) — install via https://rustup.rs
# - alef CLI — install via cargo install --git https://github.com/xberg-io/alef
# - poly — install via cargo install --git https://github.com/Goldziher/polylint poly-cli
# - Per-language tools auto-skipped via alef preconditions; install as needed:
#   - Python: uv, Node: pnpm (corepack enable), Ruby: bundle, PHP: composer
#   - Go: go, Java: mvn (use sdkman if needed), C#: dotnet, Elixir: mix

tasks:
  setup:
    desc: "Install all dependencies and dev tools"
    cmds:
      - task: rust:install
      - alef setup
      - poly hooks install

  build:
    desc: Build core Rust library
    cmds:
      - task: rust:build

  build:core:
    desc: Build core Rust library
    cmds:
      - task: rust:build

  test:
    desc: Run Rust tests
    cmds:
      - task: rust:test

  test:bindings:
    desc: Run binding test suites only
    cmds:
      - alef test

  test:ci:
    desc: Run test suites in CI mode
    cmds:
      - task: test:all

  update:
    desc: Update all dependencies within current major versions (no breaking changes)
    cmds:
      - cmd: alef update
        ignore_error: true
      - cmd: cargo update
        ignore_error: true
      - cmd: gau --update .
        ignore_error: true
      - cmd: cd packages/python && uv sync --all-extras --no-install-workspace --no-install-project
        ignore_error: true
      - cmd: pnpm up -r
        ignore_error: true
      - cmd: cd packages/go && go get -u=patch ./... && go mod tidy
        ignore_error: true
      - cmd: cd packages/ruby && bundle update --conservative
        ignore_error: true
      # packages/php/composer.json is generated at build time; skip cleanly if absent.
      - cmd: '[ -f packages/php/composer.json ] && (cd packages/php && composer update --no-interaction) || echo "skip php: packages/php/composer.json not present (run task php:build first)"'
        ignore_error: true
      - cmd: cd packages/elixir && mix deps.update --all
        ignore_error: true
      - cmd: cd packages/dart && dart pub upgrade --major-versions=false || dart pub upgrade
        ignore_error: true
      - cmd: cd packages/swift && swift package update
        ignore_error: true

  upgrade:
    desc: Upgrade all dependencies to latest versions including cross-major bumps
    cmds:
      - cmd: alef update --latest
        ignore_error: true
      - cmd: cargo upgrade --incompatible
        ignore_error: true
      - cmd: gau --update .
        ignore_error: true
      - cmd: cd packages/python && uv sync --all-extras --upgrade --no-install-workspace --no-install-project
        ignore_error: true
      - cmd: pnpm up -r --latest
        ignore_error: true
      - cmd: cd packages/go && go get -u ./... && go mod tidy
        ignore_error: true
      - cmd: cd packages/ruby && bundle update
        ignore_error: true
      # packages/php/composer.json is generated at build time; skip cleanly if absent.
      - cmd: '[ -f packages/php/composer.json ] && (cd packages/php && composer update --with-all-dependencies --no-interaction) || echo "skip php: packages/php/composer.json not present (run task php:build first)"'
        ignore_error: true
      - cmd: cd packages/elixir && mix deps.update --all
        ignore_error: true
      - cmd: cd packages/dart && dart pub upgrade --major-versions
        ignore_error: true
      - cmd: cd packages/swift && swift package update
        ignore_error: true
      - cmd: task zig:update
        ignore_error: true
      - cmd: task java:update
        ignore_error: true
      - cmd: task csharp:update
        ignore_error: true

  clean:
    desc: Clean all build artifacts (per-language only; see `clean:full` for cargo + e2e)
    cmds:
      - task: rust:clean
      - task: python:clean
      - task: ruby:clean
      - task: node:clean
      - task: java:clean
      - task: go:clean
      - task: csharp:clean
      - task: php:clean
      - task: elixir:clean
      - task: wasm:clean
      - task: c:clean

  clean:e2e:
    desc: Remove per-language e2e test deps (venvs, node_modules, lockfiles, _build, etc.)
    cmds:
      - task: _dev_wf:clean:e2e

  clean:workspace:
    desc: Clean Rust workspace target + alef IR cache + legacy mock-server binaries
    cmds:
      - task: _dev_wf:clean:workspace

  clean:full:
    desc: "Total cleanup: per-language clean + cargo workspace target + e2e test deps"
    cmds:
      - task: _dev_wf:clean:full

  alef:install:
    desc: Install the alef CLI from the sibling repo (../alef) at HEAD
    cmds:
      - task: _dev_wf:alef:install

  alef:generate:
    desc: "Regenerate all Alef-managed outputs without formatting or building"
    cmds:
      - alef all --clean --format=false

  alef:verify:
    desc: "Check Alef-generated files are up to date"
    cmds:
      - task: _dev_wf:alef:verify

  alef:build:
    desc: "Build all language bindings"
    cmds:
      - alef build

  alef:format:
    desc: "Format Alef-managed generated outputs"
    cmds:
      - alef fmt

  alef:sync:
    desc: "Sync version from Cargo.toml to all manifests"
    cmds:
      - alef sync-versions

  alef:docs:
    desc: "Generate API reference documentation"
    cmds:
      - task: docs:generate

  docs:generate:
    desc: "Generate API reference documentation"
    cmds:
      - alef docs

  docs:generate:check:
    desc: "Validate API reference docs are up-to-date"
    cmds:
      - alef verify --exit-code

  readme:generate:
    desc: "Generate package READMEs"
    cmds:
      - alef readme

  readme:generate:check:
    desc: "Validate package READMEs are up-to-date"
    cmds:
      - alef verify --exit-code

  alef:bump:
    desc: "Bump alef pin in alef.toml + reinstall + generate (usage: VERSION=0.15.30 task alef:bump)"
    cmds:
      - task: _dev_wf:alef:bump

  rebuild:
    desc: Rebuild all language bindings + the alef-generated e2e mock-server binary
    cmds:
      - task: _dev_wf:rebuild:bindings

  rebuild:fast:
    desc: "Fast rebuild: Rust core + Python + Node + mock-server only"
    cmds:
      - task: _dev_wf:rebuild:fast

  e2e:reset:
    desc: "Full e2e reset: clean + alef generate + rebuild all bindings + run all e2e"
    cmds:
      - task: _dev_wf:e2e:reset

  e2e:refresh:
    desc: "Quick e2e refresh: alef generate + rebuild + run all e2e (no clean)"
    cmds:
      - task: _dev_wf:e2e:refresh

  e2e:refresh:fast:
    desc: "Fast e2e feedback: alef generate + rebuild Rust/Python/Node + run their e2e"
    cmds:
      - task: _dev_wf:e2e:refresh:fast

  python:cycle:
    desc: "Python: rebuild binding + force-refresh e2e venv + run e2e (avoids stale .so)"
    cmds:
      - task: _dev_wf:python:cycle

  build:all:
    desc: Build all bindings across all languages
    cmds:
      - task: rust:build
      - task: rust:ffi:build
      - task: python:build
      - task: node:build
      - task: go:build
      - task: java:build
      - task: csharp:build
      - task: wasm:build
      - task: ruby:build
      - task: php:build
      - task: elixir:build
      - task: c:build

  build:bindings:
    desc: Build all language bindings
    cmds:
      - task: alef:build

  build:release:
    desc: Build core Rust library in release mode
    cmds:
      - task: rust:build:release

  build:ci:
    desc: Build core Rust library in CI mode
    cmds:
      - task: rust:build:ci

  build:all:dev:
    desc: Build all bindings in debug mode
    cmds:
      - task: _build_wf:all:dev

  build:all:release:
    desc: Build all bindings in release mode (optimized)
    cmds:
      - task: _build_wf:all:release

  build:all:ci:
    desc: Build all bindings in CI mode
    cmds:
      - task: _build_wf:all:ci

  test:all:
    desc: Run all tests across all languages
    cmds:
      - task: _test_wf:all

  test:all:parallel:
    desc: Run all tests in parallel (using deps)
    cmds:
      - task: _test_wf:all:parallel

  test:all:ci:
    desc: Run all tests in CI mode (with extra diagnostics)
    cmds:
      - task: _test_wf:all:ci

  lint:
    desc: Run all linters via poly
    cmds:
      - poly lint .

  lint:check:
    desc: Run linting in check mode
    cmds:
      - poly lint .

  format:
    desc: Format all code
    cmds:
      - poly fmt --fix .

  format:check:
    desc: Check code formatting without modifications
    cmds:
      - poly fmt --check .

  check:
    desc: Run check-only validation
    cmds:
      - task: format:check
      - task: lint:check

  e2e:generate:
    desc: Generate E2E tests for all languages from fixtures
    cmds:
      - alef e2e generate

  e2e:build:
    desc: Build the standalone e2e mock HTTP server binary
    cmds:
      - task: _dev_wf:mock-server:rebuild

  e2e:test:
    desc: Run e2e tests across all bindings (mock server auto-managed)
    cmds:
      - task: _dev_wf:mock-server:rebuild
      - task: _e2e_wf:test:all

  e2e:all:
    desc: Generate, lint, and run e2e tests across all bindings
    cmds:
      - task: e2e:verify

  e2e:quick:
    desc: Quick e2e (Rust only — fastest feedback)
    cmds:
      - task: _dev_wf:mock-server:rebuild
      - task: _e2e_wf:test:quick

  e2e:verify:
    desc: Full e2e pipeline — generate, lint, test all suites
    cmds:
      - task: _e2e_wf:verify:all

  e2e:lint:
    desc: Lint all generated E2E test code
    cmds:
      - task: rust:e2e:lint
      - task: python:e2e:lint
      - task: node:e2e:lint
      - task: go:e2e:lint
      - task: java:e2e:lint
      - task: csharp:e2e:lint
      - task: wasm:e2e:lint
      - task: ruby:e2e:lint
      - task: php:e2e:lint
      - task: c:e2e:lint
      - task: brew:e2e:lint

  mock-server:start:
    desc: Start the e2e mock HTTP server (background)
    cmds:
      - task: _e2e_wf:mock-server:start

  mock-server:stop:
    desc: Stop the e2e mock HTTP server
    cmds:
      - task: _e2e_wf:mock-server:stop
