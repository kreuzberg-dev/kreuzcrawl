version: "3"

tasks:
  install:
    desc: Install Kotlin dependencies
    dir: packages/kotlin
    precondition: "command -v gradle >/dev/null 2>&1"
    cmds:
      - gradle build --no-daemon -x test

  setup:
    desc: Setup Kotlin environment
    cmds:
      - task: kotlin:install

  build:
    desc: Build Kotlin package (depends on Rust FFI)
    dir: packages/kotlin
    precondition: "command -v gradle >/dev/null 2>&1"
    cmds:
      - cargo build --release -p kreuzcrawl-ffi
      - gradle assemble --no-daemon

  build:dev:
    desc: Build Kotlin package in debug mode
    dir: packages/kotlin
    precondition: "command -v gradle >/dev/null 2>&1"
    cmds:
      - cargo build -p kreuzcrawl-ffi
      - gradle assemble --no-daemon

  build:release:
    desc: Build Kotlin package in release mode (optimized)
    dir: packages/kotlin
    precondition: "command -v gradle >/dev/null 2>&1"
    cmds:
      - cargo build --release -p kreuzcrawl-ffi
      - gradle assemble --no-daemon

  build:ci:
    desc: Build Kotlin package in CI mode
    dir: packages/kotlin
    precondition: "command -v gradle >/dev/null 2>&1"
    cmds:
      - cargo build --release -p kreuzcrawl-ffi
      - gradle assemble --no-daemon

  test:
    desc: Run Kotlin tests
    dir: packages/kotlin
    precondition: "command -v gradle >/dev/null 2>&1"
    cmds:
      - gradle test --no-daemon

  test:ci:
    desc: Run Kotlin tests (CI mode)
    dir: packages/kotlin
    precondition: "command -v gradle >/dev/null 2>&1"
    cmds:
      - gradle test --no-daemon

  lint:
    desc: Lint and format Kotlin code with auto-fix
    dir: packages/kotlin
    precondition: "command -v gradle >/dev/null 2>&1"
    cmds:
      - gradle ktlintFormat --no-daemon

  lint:check:
    desc: Check Kotlin code linting without modifications
    dir: packages/kotlin
    precondition: "command -v gradle >/dev/null 2>&1"
    cmds:
      - gradle ktlint --no-daemon

  format:
    desc: Format Kotlin code
    dir: packages/kotlin
    precondition: "command -v gradle >/dev/null 2>&1"
    cmds:
      - gradle ktlintFormat --no-daemon

  format:check:
    desc: Check Kotlin code formatting
    dir: packages/kotlin
    precondition: "command -v gradle >/dev/null 2>&1"
    cmds:
      - gradle ktlint --no-daemon

  clean:
    desc: Clean Kotlin build artifacts
    dir: packages/kotlin
    precondition: "command -v gradle >/dev/null 2>&1"
    cmds:
      - gradle clean --no-daemon
      - rm -rf build

  update:
    desc: Update Kotlin dependencies to latest versions
    dir: packages/kotlin
    precondition: "command -v gradle >/dev/null 2>&1"
    cmds:
      - echo "Updating Kotlin dependencies..."
      - gradle dependencyUpdates --no-daemon
      - echo "Please review and manually update version constraints in build.gradle.kts"

  e2e:generate:
    desc: Generate and format Kotlin E2E tests from fixtures
    cmds:
      - cmd: bash scripts/task/e2e-generate.sh kotlin
        platforms: [linux, darwin]
      - cmd: echo "E2E generation not yet supported on Windows - use WSL or CI"
        platforms: [windows]
      - task: e2e:format

  e2e:format:
    desc: Format Kotlin E2E code
    dir: e2e/kotlin
    precondition: "command -v gradle >/dev/null 2>&1"
    cmds:
      - gradle ktlintFormat --no-daemon

  e2e:lint:
    desc: Lint Kotlin E2E code
    dir: e2e/kotlin
    precondition: "command -v gradle >/dev/null 2>&1"
    cmds:
      - gradle ktlint --no-daemon

  e2e:test:
    desc: Run generated Kotlin E2E tests
    dir: e2e/kotlin
    precondition: "command -v gradle >/dev/null 2>&1"
    cmds:
      - gradle test --no-daemon

  e2e:verify:
    desc: Regenerate and validate Kotlin E2E suite (build + generate + lint + test)
    cmds:
      - task: build
      - task: e2e:generate
      - task: e2e:lint
      - task: e2e:test
