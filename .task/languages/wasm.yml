version: "3"

includes:
    _cfg:
        taskfile: ../config/vars.yml
        internal: true
    _platforms:
        taskfile: ../config/platforms.yml
        internal: true

vars:
    WASM_DIR: "{{.ROOT}}/crates/crawlberg-wasm"
    WASI_SDK:
        sh: echo "${WASI_SDK_PATH:-$HOME/wasi-sdk}"
    WASI_CC:
        sh: echo "${WASI_SDK_PATH:-$HOME/wasi-sdk}/bin/clang"
    WASI_AR:
        sh: echo "${WASI_SDK_PATH:-$HOME/wasi-sdk}/bin/ar"

tasks:
    install:
        desc: Install WASM dependencies (pnpm)
        dir: crates/crawlberg-wasm
        cmds:
            - pnpm install

    setup:
        desc: Setup WASM environment (alias for install)
        dir: crates/crawlberg-wasm
        cmds:
            - pnpm install

    build:
        desc: Build WASM bindings for Node.js target (uses {{.BUILD_PROFILE}})
        dir: crates/crawlberg-wasm
        env:
            RUSTFLAGS:
            CC_wasm32_unknown_unknown: "{{.WASI_CC}}"
            AR_wasm32_unknown_unknown: "{{.WASI_AR}}"
        cmds:
            - pnpm run build

    build:dev:
        desc: Build WASM bindings in debug mode
        dir: crates/crawlberg-wasm
        env:
            RUSTFLAGS:
            CC_wasm32_unknown_unknown: "{{.WASI_CC}}"
            AR_wasm32_unknown_unknown: "{{.WASI_AR}}"
        cmds:
            - pnpm run build

    build:release:
        desc: Build WASM bindings in release mode (optimized)
        dir: crates/crawlberg-wasm
        env:
            NODE_ENV: production
            RUSTFLAGS:
            CC_wasm32_unknown_unknown: "{{.WASI_CC}}"
            AR_wasm32_unknown_unknown: "{{.WASI_AR}}"
        cmds:
            - pnpm run build

    build:ci:
        desc: Build WASM bindings in CI mode
        dir: crates/crawlberg-wasm
        env:
            NODE_ENV: production
            RUSTFLAGS:
            CC_wasm32_unknown_unknown: "{{.WASI_CC}}"
            AR_wasm32_unknown_unknown: "{{.WASI_AR}}"
        cmds:
            - pnpm run build:ci

    build:web:
        desc: Build WASM for web browsers
        dir: crates/crawlberg-wasm
        env:
            RUSTFLAGS:
            CC_wasm32_unknown_unknown: "{{.WASI_CC}}"
            AR_wasm32_unknown_unknown: "{{.WASI_AR}}"
        cmds:
            - pnpm run build:wasm:web

    build:bundler:
        desc: Build WASM for bundlers (webpack, rollup, etc)
        dir: crates/crawlberg-wasm
        env:
            RUSTFLAGS:
            CC_wasm32_unknown_unknown: "{{.WASI_CC}}"
            AR_wasm32_unknown_unknown: "{{.WASI_AR}}"
        cmds:
            - pnpm run build:wasm:bundler

    build:nodejs:
        desc: Build WASM for Node.js
        dir: crates/crawlberg-wasm
        env:
            RUSTFLAGS:
            CC_wasm32_unknown_unknown: "{{.WASI_CC}}"
            AR_wasm32_unknown_unknown: "{{.WASI_AR}}"
        cmds:
            - pnpm run build:wasm:nodejs

    build:deno:
        desc: Build WASM for Deno
        dir: crates/crawlberg-wasm
        env:
            RUSTFLAGS:
            CC_wasm32_unknown_unknown: "{{.WASI_CC}}"
            AR_wasm32_unknown_unknown: "{{.WASI_AR}}"
        cmds:
            - pnpm run build:wasm:deno

    build:all:
        desc: Build WASM for all targets (web, bundler, nodejs, deno)
        dir: crates/crawlberg-wasm
        env:
            RUSTFLAGS:
            CC_wasm32_unknown_unknown: "{{.WASI_CC}}"
            AR_wasm32_unknown_unknown: "{{.WASI_AR}}"
        cmds:
            - pnpm run build:all

    build:bindings:
        desc: Build WASM bindings for benchmarking
        env:
            RUSTFLAGS:
        cmds:
            - bash scripts/benchmarks/build-wasm-bindings.sh

    test:
        desc: Run WASM unit tests with Vitest
        dir: crates/crawlberg-wasm
        cmds:
            - pnpm test

    test:ci:
        desc: Run WASM unit tests in CI mode
        dir: crates/crawlberg-wasm
        cmds:
            - pnpm run build:ci
            - pnpm test

    test:watch:
        desc: Run WASM tests in watch mode
        dir: crates/crawlberg-wasm
        cmds:
            - pnpm test:watch

    test:coverage:
        desc: Run WASM tests with coverage report
        dir: crates/crawlberg-wasm
        cmds:
            - pnpm test:coverage

    clippy:
        desc: Run clippy on crawlberg-wasm crate
        env:
            CC_wasm32_unknown_unknown: "{{.WASI_CC}}"
            AR_wasm32_unknown_unknown: "{{.WASI_AR}}"
        cmds:
            - cargo clippy -p crawlberg-wasm --target wasm32-unknown-unknown -- -D warnings

    lint:
        desc: Lint WASM TypeScript code with auto-fix (oxlint)
        cmds:
            - prek run oxlint --all-files

    lint:check:
        desc: Check WASM TypeScript linting without modifications
        cmds:
            - prek run oxlint --all-files

    format:
        desc: Format WASM TypeScript code with modifications (oxfmt)
        cmds:
            - prek run oxfmt --all-files

    format:check:
        desc: Check WASM TypeScript formatting without modifications
        cmds:
            - prek run oxfmt --all-files

    typecheck:
        desc: Type-check WASM TypeScript code
        dir: crates/crawlberg-wasm
        cmds:
            - pnpm run typecheck

    clean:
        desc: Clean WASM build artifacts
        cmds:
            - cmd: bash -c "rm -rf crates/crawlberg-wasm/dist crates/crawlberg-wasm/pkg crates/crawlberg-wasm/node_modules crates/crawlberg-wasm/.wasm-pack"
              platforms: [linux, darwin]
            - cmd: powershell -Command "Remove-Item -Path @('crates/crawlberg-wasm/dist', 'crates/crawlberg-wasm/pkg', 'crates/crawlberg-wasm/node_modules', 'crates/crawlberg-wasm/.wasm-pack') -Recurse -ErrorAction SilentlyContinue; exit 0"
              platforms: [windows]
            - cmd: cd crates/crawlberg-wasm && pnpm run clean
              ignore_error: true

    update:
        desc: Update WASM dependencies
        cmds:
            - echo "WASM dependencies updated via node:update (pnpm workspace)"

    e2e:generate:
        desc: Generate WASM E2E tests from fixtures (alef)
        cmds:
            - alef e2e generate

    e2e:lint:
        desc: Lint generated WASM E2E TypeScript
        dir: e2e/wasm
        cmds:
            - pnpm dlx oxlint .

    e2e:test:
        desc: Run WASM E2E tests (Node/vitest, alef-generated)
        dir: e2e/wasm
        cmds:
            - pnpm install
            # Use `pnpm exec` (not `pnpm dlx`) so vitest runs against the
            # e2e/wasm/node_modules deps (vite-plugin-wasm etc.). `pnpm dlx`
            # downloads vitest into a temp dir and resolves config from
            # parent directories, finding a repo-root vitest.config and
            # failing to import vite-plugin-wasm from there.
            - pnpm exec vitest run

    e2e:deno:verify:
        desc: Regenerate and validate WASM Deno E2E suite (generate + lint + test)
        cmds:
            - task: e2e:generate
            - task: e2e:lint
            - task: e2e:test

    e2e:workers:verify:
        desc: Build, regenerate, and validate Cloudflare Workers WASM E2E suite
        cmds:
            - task: build
            - task: e2e:workers:generate
            - task: e2e:workers:test

    e2e:verify:
        desc: Verify all WASM test suites (Deno + Workers)
        cmds:
            - task: e2e:deno:verify
            - task: e2e:workers:verify
