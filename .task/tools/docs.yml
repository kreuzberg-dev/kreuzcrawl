version: "3"

tasks:
  build:
    desc: Build documentation site
    cmds:
      - uv run --group doc zensical build --clean

  serve:
    desc: Serve documentation site locally
    cmds:
      - uv run --group doc zensical serve

  generate-readme:
    desc: Generate language package READMEs from templates via alef
    cmds:
      - alef readme

  generate-readme:check:
    desc: Validate READMEs match templates (CI mode)
    cmds:
      - alef readme
      - git diff --exit-code -- packages/*/README.md crates/*/README.md

  generate-docs:
    desc: Generate API reference documentation via alef
    cmds:
      - alef docs

  generate-docs:check:
    desc: Validate API docs are up to date (CI mode)
    cmds:
      - alef docs
      - git diff --exit-code -- docs/reference/

  generate:all:
    desc: Generate all documentation (READMEs + API reference)
    cmds:
      - alef readme
      - alef docs
