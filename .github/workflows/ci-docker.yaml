name: CI Docker

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci-docker.yaml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**'
      - 'docker/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/ci-docker.yaml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**'
      - 'docker/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-docker-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  docker-build:
    name: "Build: Docker (${{ matrix.variant }})"
    if: github.repository == 'kreuzberg-dev/kreuzcrawl' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: true
      matrix:
        variant:
          - default
          - cli
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.variant }}
          push: false
          load: true
          tags: kreuzcrawl:${{ matrix.variant }}
          cache-from: type=gha,scope=ci-docker-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=ci-docker-${{ matrix.variant }}

      - name: Save Docker image as artifact
        shell: bash
        run: |
          mkdir -p /tmp
          docker save kreuzcrawl:${{ matrix.variant }} | gzip > /tmp/kreuzcrawl-${{ matrix.variant }}.tar.gz
          ls -lh /tmp/kreuzcrawl-${{ matrix.variant }}.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ matrix.variant }}
          path: /tmp/kreuzcrawl-${{ matrix.variant }}.tar.gz
          retention-days: 1
          compression-level: 0

  docker-test:
    needs: [docker-build]
    name: "Test: Docker (${{ matrix.variant }})"
    if: github.repository == 'kreuzberg-dev/kreuzcrawl' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        variant:
          - default
          - cli
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ matrix.variant }}
          path: /tmp

      - name: Load Docker image
        shell: bash
        run: docker load < /tmp/kreuzcrawl-${{ matrix.variant }}.tar.gz

      - name: Test --version
        shell: bash
        run: docker run --rm kreuzcrawl:${{ matrix.variant }} --version

      - name: Test --help
        shell: bash
        run: docker run --rm kreuzcrawl:${{ matrix.variant }} --help

      - name: Start container
        if: matrix.variant == 'default'
        shell: bash
        run: |
          docker run -d --name kreuzcrawl-test -p 3000:3000 kreuzcrawl:${{ matrix.variant }}
          sleep 5

      - name: Test /health endpoint
        if: matrix.variant == 'default'
        shell: bash
        run: |
          curl -sf http://localhost:3000/health | jq .

      - name: Test /openapi.json endpoint
        if: matrix.variant == 'default'
        shell: bash
        run: |
          curl -sf http://localhost:3000/openapi.json | jq .type

      - name: Test /version endpoint
        if: matrix.variant == 'default'
        shell: bash
        run: |
          curl -sf http://localhost:3000/version | jq .

      - name: Run API contract tests with schemathesis
        if: matrix.variant == 'default'
        shell: bash
        run: |
          pip3 install schemathesis
          FAILED=0
          schemathesis run http://localhost:3000/openapi.json \
            --max-examples=10 \
            --request-timeout=30000 \
            --checks not_a_server_error,status_code_conformance,content_type_conformance,response_schema_conformance,negative_data_rejection || FAILED=1
          exit "$FAILED"

      - name: Stop container
        if: always() && matrix.variant == 'default'
        shell: bash
        run: |
          docker stop kreuzcrawl-test || true
          docker rm kreuzcrawl-test || true

      - name: Check image size (cli)
        if: matrix.variant == 'cli'
        shell: bash
        run: |
          size_mb=$(docker inspect kreuzcrawl:cli --format='{{.Size}}' | awk '{print int($1/1024/1024)}')
          echo "CLI image size: ${size_mb}MB"
          if [ "$size_mb" -gt 200 ]; then
            echo "::error::CLI image is larger than 200MB (${size_mb}MB). Expected a minimal static binary image."
            exit 1
          fi

      - name: Verify non-root user
        if: matrix.variant == 'default'
        shell: bash
        run: |
          user=$(docker run --rm kreuzcrawl:${{ matrix.variant }} whoami 2>/dev/null || docker run --rm --entrypoint id kreuzcrawl:${{ matrix.variant }} -un)
          echo "Container user: $user"
          if [ "$user" = "root" ]; then
            echo "::error::Container is running as root. Expected a non-root user."
            exit 1
          fi

      - name: Clean up Docker resources
        if: always()
        shell: bash
        run: |
          docker rmi kreuzcrawl:${{ matrix.variant }} || true
          docker system prune -af --volumes || true
