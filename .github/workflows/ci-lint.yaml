name: CI Lint

on:
  workflow_dispatch:

concurrency:
  group: ci-lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    if: github.repository == 'xberg-io/crawlberg' && github.actor != 'dependabot[bot]'
    uses: xberg-io/actions/.github/workflows/reusable-validate.yml@v1
    with:
      setup-rust: true
      setup-python: true
      python-version: "3.13"
