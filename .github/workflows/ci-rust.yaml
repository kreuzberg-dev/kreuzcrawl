name: CI Rust

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci-rust.yaml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/ci-rust.yaml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-rust-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short

jobs:
  test:
    name: Rust Tests (${{ matrix.os }})
    if: github.repository == 'kreuzberg-dev/kreuzcrawl' && github.actor != 'dependabot[bot]'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace
